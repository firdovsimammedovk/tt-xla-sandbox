name: Docs - Build & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
      DOC_CATALOG_SOURCE_ID: docs-tenstorrent
      DOC_SITE_BASE_URL: https://firdovsimammedovk.github.io/tt-xla-sandbox
      DOCS_ID_NAMESPACE: tt-xla
      DOCS_INDEX_VERSION: latest
      DOCS_OUTPUT_DIR: docs/build/html
      DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build versioned docs
        run: |
          mkdir -p docs/build/html

          # Build latest
          DOCS_VERSION=latest sphinx-build docs/source docs/build/html/latest

          # Build each git tag
          for TAG in $(git tag -l 'v*' --sort=-version:refname); do
            git checkout "$TAG" -- docs/
            DOCS_VERSION="$TAG" sphinx-build docs/source "docs/build/html/$TAG"
            git checkout HEAD -- docs/
          done

          # Generate versions.json
          python - <<'PYEOF'
          import json, subprocess
          tags = subprocess.check_output(
              ["git", "tag", "-l", "v*", "--sort=-version:refname"]
          ).decode().strip().split("\n")
          tags = [t for t in tags if t]
          base = "https://firdovsimammedovk.github.io/tt-xla-sandbox/"
          versions = [{"name": "latest", "url": f"{base}latest/"}] + [
              {"name": t, "url": f"{base}{t}/"} for t in tags
          ]
          with open("docs/build/html/versions.json", "w") as f:
              json.dump({"versions": versions}, f, indent=2)
          PYEOF

          # Root redirect to latest
          echo '<meta http-equiv="refresh" content="0; url=latest/">' > docs/build/html/index.html
          touch docs/build/html/.nojekyll

      - name: Warn if remote search ingest key is missing
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY == '' }}
        run: echo "::warning::Skipping OpenSearch indexing because DOCS_SEARCH_INGEST_API_KEY is not set."

      - name: Index docs into OpenSearch
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY != '' }}
        run: python scripts/index_remote_search.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
